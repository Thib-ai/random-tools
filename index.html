<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Tools</title>
    <link rel="preload" href="styles.css" as="style">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🛠️ Random Tools</h1>
        <p>A collection of useful browser-based tools</p>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Search tools..." autocomplete="off">
            <button id="clear-search" class="hidden">×</button>
        </div>

        <div class="filters">
            <button id="filter-all" class="filter-btn active" data-category="all">All</button>
            <button id="filter-web" class="filter-btn" data-category="web">Web</button>
            <button id="filter-text" class="filter-btn" data-category="text">Text</button>
            <button id="filter-code" class="filter-btn" data-category="code">Code</button>
            <button id="filter-utility" class="filter-btn" data-category="utility">Utility</button>
        </div>

        <div id="tools-grid" class="tools-grid">
            <!-- Tools will be dynamically loaded here -->
        </div>

        <div id="no-results" class="no-results hidden">
            <p>No tools found matching your search.</p>
        </div>
    </main>

    <footer>
        <p>© <span id="current-year"></span> Random Tools | <a href="https://github.com/Thib-ai/random-tools">GitHub</a></p>
    </footer>

    <!-- Inline tools data to eliminate network request -->
    <script>
        window.__TOOLS_DATA__ = [
    {
        "id": "fedi-username-normalizer",
        "title": "Fedi Username Normalizer",
        "description": "Convert Fediverse profile URLs to standard username@domain format.",
        "icon": "🔄",
        "category": "text",
        "tags": ["fediverse", "mastodon", "username", "normalize", "social"],
        "path": "tools/fedi-username-normalizer/index.html",
        "enabled": true
    }
];
    </script>
    <script src="script.js"></script>
</body>
</html>
