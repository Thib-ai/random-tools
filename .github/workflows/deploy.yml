name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deployment path
        id: paths
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "DEST_DIR=." >> $GITHUB_OUTPUT
          else
            PR_NUM=${{ github.event.pull_request.number }}
            echo "DEST_DIR=preview/pr-$PR_NUM" >> $GITHUB_OUTPUT
          fi

      - name: Prepare files
        run: |
          mkdir -p build
          cp -r * build/ || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          destination_dir: ${{ steps.paths.outputs.DEST_DIR }}
          keep_files: false
          user_name: "GitHub Actions"
          user_email: "actions@github.com"

      - name: Comment PR with preview URL
        if: github.ref != 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) return;
            
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/preview/pr-${prNumber}/`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });
            
            const previewComment = comments.find(c => 
              c.body.includes('PR Preview Ready') || c.body.includes(previewUrl)
            );
            
            if (!previewComment) {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: `🚀 **PR Preview Ready!**\n\nYou can preview this PR at:\n${previewUrl}\n\n_Note: Previews may take a few minutes to deploy._`
              });
            }
